{% extends "layout.html" %}
{% set active_page = 'settings' %}

{% block title %}纠错规则管理 - BSHT Bot{% endblock %}
{% block page_title %}纠错规则管理{% endblock %}

{% block page_actions %}
<button class="btn btn-sm btn-primary" onclick="reloadRules()">🔄 重载规则</button>
<button class="btn btn-sm btn-success" onclick="showImportModal()">导入</button>
<button class="btn btn-sm btn-ghost" onclick="exportRules()">导出</button>
<button class="btn btn-sm btn-primary" onclick="showAddModal()">+ 添加规则</button>
{% endblock %}

{% block page_content %}
<!-- 统计卡片 -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">总规则数</div>
        <div class="stat-value" id="totalRules">--</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">启用规则</div>
        <div class="stat-value" id="enabledRules">--</div>
    </div>
</div>

<!-- 搜索筛选 -->
<div class="card">
    <div class="card-body" style="padding:15px;">
        <div style="display:flex;gap:15px;align-items:center;flex-wrap:wrap;">
            <input type="text" id="searchInput" class="form-control" style="max-width:300px;" placeholder="搜索源文本或目标文本..." oninput="filterRules()">
            <select id="categoryFilter" class="form-control" style="width:150px;" onchange="filterRules()">
                <option value="">全部分类</option>
                <option value="general">通用</option>
                <option value="number">数字</option>
                <option value="callsign">呼号</option>
                <option value="phonetic">语音</option>
            </select>
        </div>
    </div>
</div>

<!-- 规则列表 -->
<div class="card">
    <div class="card-body">
        <div id="rulesTable">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let allRules = [];
let currentCategory = '';

// 加载规则
async function loadRules() {
    try {
        const data = await BSHTApp.get('/api/correction/api/rules');
        if (data.success) {
            allRules = data.rules || [];
            updateStats();
            filterRules();
        }
    } catch (e) {
        document.getElementById('rulesTable').innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`;
    }
}

// 更新统计
function updateStats() {
    document.getElementById('totalRules').textContent = allRules.length;
    document.getElementById('enabledRules').textContent = allRules.filter(r => r.enabled).length;
}

// 筛选规则
function filterRules() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;

    let filtered = allRules;

    if (search) {
        filtered = filtered.filter(r =>
            (r.wrong_text && r.wrong_text.toLowerCase().includes(search)) ||
            (r.correct_text && r.correct_text.toLowerCase().includes(search))
        );
    }

    if (category) {
        filtered = filtered.filter(r => r.category === category);
    }

    renderRules(filtered);
}

// 渲染规则列表
function renderRules(items) {
    const tbody = document.getElementById('rulesTable');

    if (items.length === 0) {
        tbody.innerHTML = '<div class="empty-state">暂无规则</div>';
        return;
    }

    tbody.innerHTML = `<table class="table">
        <thead>
            <tr>
                <th>源文本</th>
                <th>目标文本</th>
                <th>分类</th>
                <th>优先级</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            ${items.map(r => `
            <tr>
                <td>${escapeHtml(r.wrong_text)}</td>
                <td>${escapeHtml(r.correct_text)}</td>
                <td>${getCategoryLabel(r.category)}</td>
                <td>${r.priority || 0}</td>
                <td>
                    <span class="badge badge-${r.enabled ? 'success' : 'warning'}" style="cursor:pointer" onclick="toggleRule(${r.id})">
                        ${r.enabled ? '启用' : '禁用'}
                    </span>
                </td>
                <td>
                    <button class="btn btn-sm btn-ghost" onclick="editRule(${r.id})">编辑</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteRule(${r.id})">删除</button>
                </td>
            </tr>
            `).join('')}
        </tbody>
    </table>`;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function getCategoryLabel(cat) {
    const labels = { general: '通用', number: '数字', callsign: '呼号', phonetic: '语音' };
    return labels[cat] || cat;
}

// 显示添加弹窗
function showAddModal() {
    document.getElementById('modalTitle').textContent = '添加规则';
    document.getElementById('ruleId').value = '';
    document.getElementById('wrongText').value = '';
    document.getElementById('correctText').value = '';
    document.getElementById('ruleCategory').value = 'general';
    document.getElementById('rulePriority').value = 0;
    document.getElementById('ruleModal').classList.add('show');
}

// 编辑规则
function editRule(id) {
    const rule = allRules.find(r => r.id === id);
    if (!rule) return;

    document.getElementById('modalTitle').textContent = '编辑规则';
    document.getElementById('ruleId').value = rule.id;
    document.getElementById('wrongText').value = rule.wrong_text;
    document.getElementById('correctText').value = rule.correct_text;
    document.getElementById('ruleCategory').value = rule.category || 'general';
    document.getElementById('rulePriority').value = rule.priority || 0;
    document.getElementById('ruleModal').classList.add('show');
}

// 关闭弹窗
function closeModal() {
    document.getElementById('ruleModal').classList.remove('show');
}

// 保存规则
async function saveRule() {
    const id = document.getElementById('ruleId').value;
    const wrong_text = document.getElementById('wrongText').value.trim();
    const correct_text = document.getElementById('correctText').value.trim();
    const category = document.getElementById('ruleCategory').value;
    const priority = parseInt(document.getElementById('rulePriority').value) || 0;

    if (!wrong_text || !correct_text) {
        alert('请填写源文本和目标文本');
        return;
    }

    try {
        const url = id ? `/api/correction/api/rules/${id}` : '/api/correction/api/rules';
        const method = id ? 'PUT' : 'POST';

        await BSHTApp.post(url, { wrong_text, correct_text, category, priority });

        closeModal();
        loadRules();
    } catch (e) {
        alert('保存失败: ' + e.message);
    }
}

// 删除规则
async function deleteRule(id) {
    if (!await confirm('确定要删除这条规则吗？')) return;

    try {
        await BSHTApp.del(`/api/correction/api/rules/${id}`);
        loadRules();
    } catch (e) {
        alert('删除失败: ' + e.message);
    }
}

// 切换启用状态
async function toggleRule(id) {
    try {
        await BSHTApp.post(`/api/correction/api/rules/toggle/${id}`);
        loadRules();
    } catch (e) {
        alert('操作失败: ' + e.message);
    }
}

// 重载规则
async function reloadRules() {
    try {
        await BSHTApp.post('/api/correction/api/rules/reload');
        alert('规则已重载');
    } catch (e) {
        alert('重载失败: ' + e.message);
    }
}

// 导入
function showImportModal() {
    document.getElementById('importModal').classList.add('show');
}

function closeImportModal() {
    document.getElementById('importModal').classList.remove('show');
}

async function importRules() {
    const data = document.getElementById('importData').value;
    try {
        const rules = JSON.parse(data);
        const result = await BSHTApp.post('/api/correction/api/rules/import', { rules });
        if (result.success) {
            alert(`导入成功: ${result.imported} 条`);
            closeImportModal();
            loadRules();
        } else {
            alert('导入失败: ' + result.error);
        }
    } catch (e) {
        alert('导入失败: ' + e.message);
    }
}

// 导出
async function exportRules() {
    try {
        const result = await BSHTApp.get('/api/correction/api/rules/export');
        if (result.success) {
            const json = JSON.stringify(result.rules, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'correction_rules.json';
            a.click();
            URL.revokeObjectURL(url);
        }
    } catch (e) {
        alert('导出失败: ' + e.message);
    }
}

// 初始化
loadRules();
</script>

<!-- 添加/编辑弹窗 -->
<div class="modal" id="ruleModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">添加规则</h3>
            <button class="btn btn-ghost" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="ruleId">
            <div class="form-group">
                <label class="form-label">源文本（错误）</label>
                <input type="text" class="form-control" id="wrongText" placeholder="例如：柴友">
            </div>
            <div class="form-group">
                <label class="form-label">目标文本（正确）</label>
                <input type="text" class="form-control" id="correctText" placeholder="例如：台友">
            </div>
            <div class="form-group">
                <label class="form-label">分类</label>
                <select class="form-control" id="ruleCategory">
                    <option value="general">通用</option>
                    <option value="number">数字</option>
                    <option value="callsign">呼号</option>
                    <option value="phonetic">语音</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">优先级</label>
                <input type="number" class="form-control" id="rulePriority" value="0" min="0" max="100">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveRule()">保存</button>
        </div>
    </div>
</div>

<!-- 导入弹窗 -->
<div class="modal" id="importModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>导入规则</h3>
            <button class="btn btn-ghost" onclick="closeImportModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">JSON 格式规则</label>
                <textarea class="form-control" id="importData" rows="10" placeholder='[{"wrong_text":"错误","correct_text":"正确","category":"general","priority":0}]'></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeImportModal()">取消</button>
            <button class="btn btn-success" onclick="importRules()">导入</button>
        </div>
    </div>
</div>
{% endblock %}
