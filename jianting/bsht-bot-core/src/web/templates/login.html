{% extends "base.html" %}

{% block title %}登录 - BSHT Bot 管理平台{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📡 BSHT Bot</h1>
            <p class="text-gray-600 mt-2">管理平台登录</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="请输入用户名"
                >
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="请输入密码"
                >
            </div>

            <div id="error-message" class="hidden text-red-600 text-sm text-center"></div>

            <button
                type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
            >
                登录
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-500">
            默认账号: admin / admin
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const loginForm = document.getElementById('loginForm');
const errorMessage = document.getElementById('error-message');

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(loginForm);
    const data = {
        username: formData.get('username'),
        password: formData.get('password')
    };

    try {
        const response = await fetchAPI('/auth/login', {
            method: 'POST',
            body: JSON.stringify(data)
        });

        if (response.code === 0) {
            // 登录成功，跳转到首页
            window.location.href = '/';
        } else {
            showError(response.message || '登录失败');
        }
    } catch (error) {
        showError('登录请求失败: ' + error.message);
    }
});

function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.remove('hidden');
}
</script>
{% endblock %}
